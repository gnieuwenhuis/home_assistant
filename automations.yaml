# ============================================================
# HVAC controllers
# ------------------------------------------------------------
# Each room has one controller running every minute. It turns
# the room's heat pump on/off and aligns its hvac_mode and
# setpoint with the room's current need:
#
#   indoor < preferred − swing   → heating mode pumps on,
#                                  cooling mode pumps off
#   indoor > preferred + swing   → cooling mode pumps on,
#                                  heating mode pumps off
#   inside the dead band         → no action
#
# `swing` is read from input_number.<room>_temp_range, so a
# single helper controls how aggressively the room cycles in
# both heating and cooling.
# ============================================================

- id: office_hvac_controller
  alias: Office HVAC Controller
  description: >-
    Drive the office heat pump (switch + climate) toward preferred ± swing.
    Fires only when setpoint, mode, preferred, or swing change, plus a 5-min
    safety heartbeat. Every Cielo API call is gated on a desired-vs-current
    delta.
  triggers:
  - trigger: state
    entity_id:
    - sensor.office_heat_pump_setpoint_temperature
    - input_number.office_preferred_temperature
    - input_number.office_temp_range
  - trigger: state
    entity_id: input_select.heat_pump_mode
    for:
      minutes: 2
  - trigger: time_pattern
    minutes: /5
  variables:
    current_temp:   "{{ states('sensor.office_baseboard_current_temperature') | float(0) }}"
    preferred:      "{{ states('input_number.office_preferred_temperature')   | float(0) }}"
    swing:          "{{ states('input_number.office_temp_range')              | float(0) }}"
    mode:           "{{ states('input_select.heat_pump_mode') }}"
    setpoint:       "{{ states('sensor.office_heat_pump_setpoint_temperature') | float(0) }}"
    too_cold:       "{{ current_temp < (preferred - swing) }}"
    too_hot:        "{{ current_temp > (preferred + swing) }}"
    desired_on:     "{{ (mode == 'heating' and too_cold) or (mode == 'cooling' and too_hot) }}"
    desired_off:    "{{ (mode == 'heating' and too_hot)  or (mode == 'cooling' and too_cold) }}"
    desired_hvac:   "{{ 'heat' if mode == 'heating' else 'cool' }}"
    switch_is_on:   "{{ is_state('switch.office_power', 'on') }}"
    current_hvac:   "{{ states('climate.office') }}"
    current_target: "{{ state_attr('climate.office', 'temperature') | float(none) }}"
  conditions:
  - "{{ mode in ['heating', 'cooling'] }}"
  - "{{ states('sensor.office_baseboard_current_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('sensor.office_heat_pump_setpoint_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('switch.office_power') not in ['unavailable', 'unknown'] }}"
  - "{{ states('climate.office') not in ['unavailable', 'unknown'] }}"
  actions:
  - choose:
    # Was off, need on → turn on + set mode + target atomically
    - conditions: "{{ desired_on and not switch_is_on }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.office_power
      - action: climate.set_temperature
        target:
          entity_id: climate.office
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    # Already on, mode or target drifted (subsumes office_temperature_sync)
    - conditions: >-
        {{ desired_on and switch_is_on and
           (current_hvac != desired_hvac or current_target != setpoint) }}
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.office
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    # Overshooting wrong direction → off
    - conditions: "{{ desired_off and switch_is_on }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.office_power
  mode: single

- id: studio_hvac_controller
  alias: Studio HVAC Controller
  description: >-
    Manage the studio heat pump (switch + climate) every minute, based on
    indoor temp vs. studio_preferred_temperature ± studio_temp_range and the
    current heat_pump_mode (heating | cooling).
  triggers:
  - trigger: time_pattern
    minutes: /1
  variables:
    current_temp: "{{ states('sensor.studio_baseboard_current_temperature') | float(0) }}"
    preferred:    "{{ states('input_number.studio_preferred_temperature')   | float(0) }}"
    swing:        "{{ states('input_number.studio_temp_range')              | float(0) }}"
    mode:         "{{ states('input_select.heat_pump_mode') }}"
    setpoint:     "{{ states('sensor.studio_heat_pump_setpoint_temperature') }}"
    too_cold:     "{{ current_temp < (preferred - swing) }}"
    too_hot:      "{{ current_temp > (preferred + swing) }}"
    desired_off:  "{{ (mode == 'heating' and too_hot) or (mode == 'cooling' and too_cold) }}"
  conditions:
  - "{{ mode in ['heating', 'cooling'] }}"
  - "{{ too_cold or too_hot }}"
  actions:
  - choose:
    - conditions: "{{ mode == 'heating' and too_cold }}"
      sequence:
      - if:
        - condition: device
          type: is_off
          device_id: 6aef9334727c71097c0983eb156030d5
          entity_id: c64bf9f712ac2d3ec6a66622476aa2d3  # studio heat pump SWITCH
          domain: switch
        then:
        - action: switch.turn_on
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
        - action: climate.set_temperature
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            temperature: "{{ setpoint }}"
            hvac_mode: heat
      - if:
        - condition: not
          conditions:
          - condition: device
            device_id: 6aef9334727c71097c0983eb156030d5
            entity_id: 38bff89f34bc5e95f454e23d27655e9f  # studio heat pump CLIMATE
            domain: climate
            type: is_hvac_mode
            hvac_mode: heat
        then:
        - action: climate.set_hvac_mode
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            hvac_mode: heat
        - action: climate.set_temperature
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            temperature: "{{ setpoint }}"
            hvac_mode: heat
    - conditions: "{{ mode == 'cooling' and too_hot }}"
      sequence:
      - if:
        - condition: device
          type: is_off
          device_id: 6aef9334727c71097c0983eb156030d5
          entity_id: c64bf9f712ac2d3ec6a66622476aa2d3
          domain: switch
        then:
        - action: switch.turn_on
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
        - action: climate.set_temperature
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            temperature: "{{ setpoint }}"
            hvac_mode: cool
      - if:
        - condition: not
          conditions:
          - condition: device
            device_id: 6aef9334727c71097c0983eb156030d5
            entity_id: 38bff89f34bc5e95f454e23d27655e9f
            domain: climate
            type: is_hvac_mode
            hvac_mode: cool
        then:
        - action: climate.set_hvac_mode
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            hvac_mode: cool
        - action: climate.set_temperature
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
          data:
            temperature: "{{ setpoint }}"
            hvac_mode: cool
    - conditions: "{{ desired_off }}"
      sequence:
      - if:
        - condition: device
          type: is_on
          device_id: 6aef9334727c71097c0983eb156030d5
          entity_id: c64bf9f712ac2d3ec6a66622476aa2d3
          domain: switch
        then:
        - action: switch.turn_off
          target:
            device_id: 6aef9334727c71097c0983eb156030d5
  mode: single

# ============================================================
# Mode switching
# ------------------------------------------------------------
# When input_select.heat_pump_mode flips (heating <-> cooling),
# nudge the studio climate entity into the new mode after a
# 2-minute debounce. The HVAC controllers above will pick up
# the office's hvac_mode on their next tick automatically.
# ============================================================

- id: '1765126659858'
  alias: Switch Heat Pump mode to Cooling
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.heat_pump_mode
    from:
    - heating
    to:
    - cooling
    for:
      hours: 0
      minutes: 2
      seconds: 0
  conditions:
  - condition: device
    device_id: 6aef9334727c71097c0983eb156030d5
    domain: climate
    entity_id: 38bff89f34bc5e95f454e23d27655e9f
    type: is_hvac_mode
    hvac_mode: heat
  actions:
  - device_id: 6aef9334727c71097c0983eb156030d5
    domain: climate
    entity_id: 38bff89f34bc5e95f454e23d27655e9f
    type: set_hvac_mode
    hvac_mode: cool
  mode: single

- id: '1765126778404'
  alias: Switch Heat Pump mode to Heating
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.heat_pump_mode
    from:
    - cooling
    to:
    - heating
    for:
      hours: 0
      minutes: 2
      seconds: 0
  conditions:
  - condition: device
    device_id: 6aef9334727c71097c0983eb156030d5
    domain: climate
    entity_id: 38bff89f34bc5e95f454e23d27655e9f
    type: is_hvac_mode
    hvac_mode: cool
  actions:
  - device_id: 6aef9334727c71097c0983eb156030d5
    domain: climate
    entity_id: 38bff89f34bc5e95f454e23d27655e9f
    type: set_hvac_mode
    hvac_mode: heat
  mode: single

# ============================================================
# Backup heat
# ------------------------------------------------------------
# Heat pumps lose efficiency below -12 °C. When the outdoor
# temperature drops, disable heat-pump heating and fall back
# to the Sinopé baseboard heaters at the room's preferred
# temperature; reverse when it warms up (baseboards drop 2.5
# °C below preferred so the heat pump takes over).
# ============================================================

- id: '1756873917108'
  alias: Disable Heat Pump in Cold Weather
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.lethbridge_temperature
    for:
      hours: 0
      minutes: 20
      seconds: 0
    below: -12
  conditions:
  - condition: state
    entity_id: input_boolean.backup_heat
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.backup_heat
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1123wf
    data:
      temperature: "{{ states('input_number.office_preferred_temperature') | float }}"
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1124wf
    data:
      temperature: "{{ states('input_number.studio_preferred_temperature') | float }}"
  - action: notify.notification_group
    data:
      message: Heat Pump Heating is Disabled, Baseboard Heat is Being Used
  mode: single

- id: '1756874009383'
  alias: Enable Heat pump in warm weather
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.lethbridge_temperature
    for:
      hours: 0
      minutes: 20
      seconds: 0
    above: -12
  conditions:
  - condition: state
    entity_id: input_boolean.backup_heat
    state: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.backup_heat
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1123wf
    data:
      temperature: "{{ states('input_number.office_preferred_temperature') | float - 2.5 }}"
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1124wf
    data:
      temperature: "{{ states('input_number.studio_preferred_temperature') | float - 2.5 }}"
  - action: notify.notification_group
    data:
      message: Heat Pump is Enabled
  mode: single

# ============================================================
# Setpoint sync
# ------------------------------------------------------------
# Between the controller's per-minute ticks, keep the climate
# entity's target_temperature aligned with the computed
# setpoint sensor (whose value drifts as conditions change).
# Only runs while the room's heat pump switch is on.
# ============================================================

- id: studio_temperature_sync
  alias: Studio Temperature Sync
  description: Keep studio heat pump target temperature aligned with the computed setpoint
  triggers:
  - trigger: time_pattern
    seconds: 15
  - trigger: time_pattern
    seconds: 45
  conditions:
  - condition: template
    value_template: >-
      {% set target = states('sensor.studio_target_temperature') | float(none) %}
      {% set setpoint = states('sensor.studio_heat_pump_setpoint_temperature') | float(none) %}
      {{ target is not none and setpoint is not none and target != setpoint }}
  - condition: device
    type: is_on
    device_id: 6aef9334727c71097c0983eb156030d5
    entity_id: c64bf9f712ac2d3ec6a66622476aa2d3
    domain: switch
  actions:
  - action: climate.set_temperature
    target:
      device_id: 6aef9334727c71097c0983eb156030d5
    data:
      temperature: "{{ states('sensor.studio_heat_pump_setpoint_temperature') }}"
      hvac_mode: "{{ 'heat' if states('input_select.heat_pump_mode') == 'heating' else 'cool' }}"
  mode: single

# ============================================================
# Humidity
# ------------------------------------------------------------
# Independent humidity band:
#   dehumidifier turns on  when humidity > set_point + tolerance
#                  off when humidity < set_point
#   humidifier   turns on  when humidity < set_point - tolerance
#                  off when humidity > set_point
# ============================================================

- id: '1765216181800'
  alias: Dehumidifier Controller
  description: ''
  triggers:
  - trigger: template
    value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") | float
      > (states("input_number.humidity_set_point") | float + states("input_number.humidity_tolerance")
      | float) }}'
  - trigger: template
    value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") | float
      < (states("input_number.humidity_set_point") | float) }}'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: switch.mini_plug_4_socket_1
          state:
          - 'off'
        - condition: template
          value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") |
            float > (states("input_number.humidity_set_point") | float + states("input_number.humidity_tolerance")
            | float) }}'
      sequence:
      - type: turn_on
        device_id: ab8b624cc66726276f8c0a35c7903c9f
        entity_id: 81db4e7da7c1b546c9f89c562d9f2877
        domain: switch
    - conditions:
      - condition: and
        conditions:
        - condition: device
          type: is_on
          device_id: ab8b624cc66726276f8c0a35c7903c9f
          entity_id: 81db4e7da7c1b546c9f89c562d9f2877
          domain: switch
        - condition: template
          value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") |
            float < (states("input_number.humidity_set_point") | float) }}'
      sequence:
      - type: turn_off
        device_id: ab8b624cc66726276f8c0a35c7903c9f
        entity_id: 81db4e7da7c1b546c9f89c562d9f2877
        domain: switch
  mode: single

- id: '1765216369307'
  alias: Humidifier Controller
  description: ''
  triggers:
  - trigger: template
    value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") | float
      > (states("input_number.humidity_set_point") | float) }}'
  - trigger: template
    value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") | float
      < (states("input_number.humidity_set_point") | float - states("input_number.humidity_tolerance")
      | float) }}'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: device
          type: is_on
          device_id: 60211ed7b46e92fd6dcadf60d8087fd0
          entity_id: 20b4932ed53a51e2d16784f0254dd996
          domain: switch
        - condition: template
          value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") |
            float > (states("input_number.humidity_set_point") | float) }}'
      sequence:
      - type: turn_off
        device_id: 60211ed7b46e92fd6dcadf60d8087fd0
        entity_id: 20b4932ed53a51e2d16784f0254dd996
        domain: switch
    - conditions:
      - condition: and
        conditions:
        - condition: device
          type: is_off
          device_id: 60211ed7b46e92fd6dcadf60d8087fd0
          entity_id: 20b4932ed53a51e2d16784f0254dd996
          domain: switch
        - condition: template
          value_template: '{{ states("sensor.tz3000_utwgoauk_snzb_02_humidity") |
            float < (states("input_number.humidity_set_point") | float - states("input_number.humidity_tolerance")
            | float) }}'
      sequence:
      - type: turn_on
        device_id: 60211ed7b46e92fd6dcadf60d8087fd0
        entity_id: 20b4932ed53a51e2d16784f0254dd996
        domain: switch
  mode: single
