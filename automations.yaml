# ============================================================
# HVAC controllers
# ------------------------------------------------------------
# Each room has one event-driven controller. It fires when the
# computed setpoint, mode, preferred temperature, or swing
# changes, plus a 5-minute safety heartbeat. It turns the
# room's heat pump on/off and keeps its hvac_mode and target
# temperature aligned with the room's current need:
#
#   indoor < preferred − swing   → heating mode pumps on,
#                                  cooling mode pumps off
#   indoor > preferred + swing   → cooling mode pumps on,
#                                  heating mode pumps off
#   inside the dead band         → no action
#
# `swing` is read from input_number.<room>_temp_range, so a
# single helper controls how aggressively the room cycles in
# both heating and cooling. The mode-change trigger (2-min
# debounce) subsumes the old mode-switch automations; the
# "already on, drifted" branch subsumes setpoint-sync.
# ============================================================

- id: office_hvac_controller
  alias: Office HVAC Controller
  description: >-
    Drive the office heat pump (switch + climate) toward preferred ± swing.
    Fires only when setpoint, mode, preferred, or swing change, plus a 5-min
    safety heartbeat. Every Cielo API call is gated on a desired-vs-current
    delta.
  triggers:
  - trigger: state
    entity_id:
    - sensor.office_heat_pump_setpoint_temperature
    - input_number.office_preferred_temperature
    - input_number.office_temp_range
  - trigger: state
    entity_id: input_select.heat_pump_mode
    for:
      minutes: 2
  - trigger: time_pattern
    minutes: /5
  variables:
    current_temp:   "{{ states('sensor.office_baseboard_current_temperature') | float(0) }}"
    preferred:      "{{ states('input_number.office_preferred_temperature')   | float(0) }}"
    swing:          "{{ states('input_number.office_temp_range')              | float(0) }}"
    mode:           "{{ states('input_select.heat_pump_mode') }}"
    setpoint:       "{{ states('sensor.office_heat_pump_setpoint_temperature') | float(0) }}"
    too_cold:       "{{ current_temp < (preferred - swing) }}"
    too_hot:        "{{ current_temp > (preferred + swing) }}"
    desired_on:     "{{ (mode == 'heating' and too_cold) or (mode == 'cooling' and too_hot) }}"
    desired_off:    "{{ (mode == 'heating' and too_hot)  or (mode == 'cooling' and too_cold) }}"
    desired_hvac:   "{{ 'heat' if mode == 'heating' else 'cool' }}"
    switch_is_on:   "{{ is_state('switch.office_power', 'on') }}"
    current_hvac:   "{{ states('climate.office') }}"
    current_target: "{{ state_attr('climate.office', 'temperature') | float(none) }}"
  conditions:
  - "{{ mode in ['heating', 'cooling'] }}"
  - "{{ states('sensor.office_baseboard_current_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('sensor.office_heat_pump_setpoint_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('switch.office_power') not in ['unavailable', 'unknown'] }}"
  - "{{ states('climate.office') not in ['unavailable', 'unknown'] }}"
  actions:
  - choose:
    # Was off, need on → turn on + set mode + target atomically
    - conditions: "{{ desired_on and not switch_is_on }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.office_power
      - action: climate.set_temperature
        target:
          entity_id: climate.office
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    # Already on, mode or target drifted (subsumes office_temperature_sync)
    - conditions: >-
        {{ desired_on and switch_is_on and
           (current_hvac != desired_hvac or current_target != setpoint) }}
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.office
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    # Overshooting wrong direction → off
    - conditions: "{{ desired_off and switch_is_on }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.office_power
  mode: single

- id: studio_hvac_controller
  alias: Studio HVAC Controller
  description: >-
    Drive the studio heat pump (switch + climate) toward preferred ± swing.
    Fires only when setpoint, mode, preferred, or swing change, plus a 5-min
    safety heartbeat. Every Cielo API call is gated on a desired-vs-current
    delta.
  triggers:
  - trigger: state
    entity_id:
    - sensor.studio_heat_pump_setpoint_temperature
    - input_number.studio_preferred_temperature
    - input_number.studio_temp_range
  - trigger: state
    entity_id: input_select.heat_pump_mode
    for:
      minutes: 2
  - trigger: time_pattern
    minutes: /5
  variables:
    current_temp:   "{{ states('sensor.studio_baseboard_current_temperature') | float(0) }}"
    preferred:      "{{ states('input_number.studio_preferred_temperature')   | float(0) }}"
    swing:          "{{ states('input_number.studio_temp_range')              | float(0) }}"
    mode:           "{{ states('input_select.heat_pump_mode') }}"
    setpoint:       "{{ states('sensor.studio_heat_pump_setpoint_temperature') | float(0) }}"
    too_cold:       "{{ current_temp < (preferred - swing) }}"
    too_hot:        "{{ current_temp > (preferred + swing) }}"
    desired_on:     "{{ (mode == 'heating' and too_cold) or (mode == 'cooling' and too_hot) }}"
    desired_off:    "{{ (mode == 'heating' and too_hot)  or (mode == 'cooling' and too_cold) }}"
    desired_hvac:   "{{ 'heat' if mode == 'heating' else 'cool' }}"
    switch_is_on:   "{{ is_state('switch.studio_power', 'on') }}"
    current_hvac:   "{{ states('climate.studio') }}"
    current_target: "{{ state_attr('climate.studio', 'temperature') | float(none) }}"
  conditions:
  - "{{ mode in ['heating', 'cooling'] }}"
  - "{{ states('sensor.studio_baseboard_current_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('sensor.studio_heat_pump_setpoint_temperature') not in ['unavailable', 'unknown'] }}"
  - "{{ states('switch.studio_power') not in ['unavailable', 'unknown'] }}"
  - "{{ states('climate.studio') not in ['unavailable', 'unknown'] }}"
  actions:
  - choose:
    - conditions: "{{ desired_on and not switch_is_on }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.studio_power
      - action: climate.set_temperature
        target:
          entity_id: climate.studio
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    - conditions: >-
        {{ desired_on and switch_is_on and
           (current_hvac != desired_hvac or current_target != setpoint) }}
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.studio
        data:
          temperature: "{{ setpoint }}"
          hvac_mode: "{{ desired_hvac }}"
    - conditions: "{{ desired_off and switch_is_on }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.studio_power
  mode: single

# ============================================================
# Backup heat
# ------------------------------------------------------------
# Heat pumps lose efficiency below -12 °C. When the outdoor
# temperature drops, disable heat-pump heating and fall back
# to the Sinopé baseboard heaters at the room's preferred
# temperature; reverse when it warms up (baseboards drop 2.5
# °C below preferred so the heat pump takes over).
# ============================================================

- id: '1756873917108'
  alias: Disable Heat Pump in Cold Weather
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.lethbridge_temperature
    for:
      hours: 0
      minutes: 20
      seconds: 0
    below: -12
  conditions:
  - condition: state
    entity_id: input_boolean.backup_heat
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.backup_heat
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1123wf
    data:
      temperature: "{{ states('input_number.office_preferred_temperature') | float }}"
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1124wf
    data:
      temperature: "{{ states('input_number.studio_preferred_temperature') | float }}"
  - action: notify.notification_group
    data:
      message: Heat Pump Heating is Disabled, Baseboard Heat is Being Used
  mode: single

- id: '1756874009383'
  alias: Enable Heat pump in warm weather
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.lethbridge_temperature
    for:
      hours: 0
      minutes: 20
      seconds: 0
    above: -12
  conditions:
  - condition: state
    entity_id: input_boolean.backup_heat
    state: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.backup_heat
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1123wf
    data:
      temperature: "{{ states('input_number.office_preferred_temperature') | float - 2.5 }}"
  - action: climate.set_temperature
    target:
      entity_id: climate.neviweb130_climate_th1124wf
    data:
      temperature: "{{ states('input_number.studio_preferred_temperature') | float - 2.5 }}"
  - action: notify.notification_group
    data:
      message: Heat Pump is Enabled
  mode: single

# ============================================================
# Humidity
# ------------------------------------------------------------
# One state-driven controller reconciles the studio humidifier
# and dehumidifier from the current humidity level (it replaced
# four edge-triggered on/off automations). It:
#   - never lets both run at once (mutual-exclusion safety),
#   - forces a 15-min relaxation cooldown after a controller
#     turn-off before the opposite device may start (stops the
#     overshoot ping-pong), and
#   - respects a manual switch flip for 15 min before resuming.
# Hysteresis around input_number.humidity_set_point with
# input_number.humidity_tolerance:
#   dehumidifier ON at set_point+tol, OFF below set_point
#   humidifier   ON at set_point-tol, OFF above set_point
# The manual detector tells controller-issued switch changes
# apart from manual ones via the *_intended mirror booleans.
# ============================================================

- id: studio_humidity_controller
  alias: Studio Humidity Controller
  description: >-
    Reconcile the studio humidifier/dehumidifier from the current humidity
    level. Enforces mutual exclusion (never both on), a 15-min cross-device
    relaxation cooldown after a controller turn-off, and a 15-min grace window
    after a manual switch flip. Fires on humidity/setpoint/switch/timer changes,
    HA start, and a 5-min heartbeat. Performs at most one action per run, gated
    on real deltas.
  triggers:
  - trigger: state
    entity_id:
    - sensor.tz3000_utwgoauk_snzb_02_humidity
    - input_number.humidity_set_point
    - input_number.humidity_tolerance
    - switch.mini_plug_4_socket_1
    - switch.studio_humidifier_socket_1
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.humidity_cooldown
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.dehumidifier_manual_grace
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.humidifier_manual_grace
  - trigger: homeassistant
    event: start
  - trigger: time_pattern
    minutes: /5
  variables:
    humidity:        "{{ states('sensor.tz3000_utwgoauk_snzb_02_humidity') | float(0) }}"
    set_point:       "{{ states('input_number.humidity_set_point') | float(0) }}"
    tolerance:       "{{ states('input_number.humidity_tolerance') | float(0) }}"
    dehum_on:        "{{ is_state('switch.mini_plug_4_socket_1', 'on') }}"
    humid_on:        "{{ is_state('switch.studio_humidifier_socket_1', 'on') }}"
    cooldown_active: "{{ is_state('timer.humidity_cooldown', 'active') }}"
    dehum_grace:     "{{ is_state('timer.dehumidifier_manual_grace', 'active') }}"
    humid_grace:     "{{ is_state('timer.humidifier_manual_grace', 'active') }}"
    desired_dehum: >-
      {{ true if humidity >= (set_point + tolerance)
         else false if humidity < set_point
         else dehum_on }}
    desired_humid: >-
      {{ true if humidity <= (set_point - tolerance)
         else false if humidity > set_point
         else humid_on }}
  conditions:
  - "{{ states('sensor.tz3000_utwgoauk_snzb_02_humidity') not in ['unavailable', 'unknown'] }}"
  - "{{ states('input_number.humidity_set_point') not in ['unavailable', 'unknown'] }}"
  - "{{ states('input_number.humidity_tolerance') not in ['unavailable', 'unknown'] }}"
  - "{{ states('switch.mini_plug_4_socket_1') not in ['unavailable', 'unknown'] }}"
  - "{{ states('switch.studio_humidifier_socket_1') not in ['unavailable', 'unknown'] }}"
  actions:
  - choose:
    # 1) Mutual-exclusion safety — both on: humidity picks the loser.
    #    Overrides cooldown and grace. Backstop for externally-induced both-on.
    - conditions: "{{ dehum_on and humid_on }}"
      sequence:
      - if: "{{ humidity > set_point }}"
        then:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.humidifier_intended
        - action: switch.turn_off
          target:
            entity_id: switch.studio_humidifier_socket_1
        else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.dehumidifier_intended
        - action: switch.turn_off
          target:
            entity_id: switch.mini_plug_4_socket_1
      - action: timer.start
        target:
          entity_id: timer.humidity_cooldown
    # 2) Dehumidifier should turn OFF (respect manual grace). Start cooldown.
    - conditions: "{{ not desired_dehum and dehum_on and not dehum_grace }}"
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.dehumidifier_intended
      - action: switch.turn_off
        target:
          entity_id: switch.mini_plug_4_socket_1
      - action: timer.start
        target:
          entity_id: timer.humidity_cooldown
    # 3) Humidifier should turn OFF (respect manual grace). Start cooldown.
    - conditions: "{{ not desired_humid and humid_on and not humid_grace }}"
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.humidifier_intended
      - action: switch.turn_off
        target:
          entity_id: switch.studio_humidifier_socket_1
      - action: timer.start
        target:
          entity_id: timer.humidity_cooldown
    # 4) Dehumidifier should turn ON. Gated on: humidifier off (mutual
    #    exclusion), no dehum grace, cooldown not active.
    - conditions: >-
        {{ desired_dehum and not dehum_on and not humid_on
           and not dehum_grace and not cooldown_active }}
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.dehumidifier_intended
      - action: switch.turn_on
        target:
          entity_id: switch.mini_plug_4_socket_1
    # 5) Humidifier should turn ON. Gated on: dehumidifier off (mutual
    #    exclusion), no humid grace, cooldown not active.
    - conditions: >-
        {{ desired_humid and not humid_on and not dehum_on
           and not humid_grace and not cooldown_active }}
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.humidifier_intended
      - action: switch.turn_on
        target:
          entity_id: switch.studio_humidifier_socket_1
  mode: single

- id: studio_humidity_manual_detector
  alias: Studio Humidity Manual Detector
  description: >-
    Detect manual flips of the studio humidifier/dehumidifier switches (any
    change the controller did not command, identified via the *_intended
    mirrors) and arm that switch's 15-min grace window so the controller leaves
    a manual override alone.
  triggers:
  - trigger: state
    entity_id: switch.mini_plug_4_socket_1
  - trigger: state
    entity_id: switch.studio_humidifier_socket_1
  conditions:
  - "{{ trigger.to_state.state in ['on', 'off'] }}"
  - "{{ not trigger.from_state or trigger.from_state.state != trigger.to_state.state }}"
  actions:
  - choose:
    - conditions: >-
        {{ trigger.entity_id == 'switch.mini_plug_4_socket_1'
           and trigger.to_state.state != states('input_boolean.dehumidifier_intended') }}
      sequence:
      - action: "input_boolean.turn_{{ trigger.to_state.state }}"
        target:
          entity_id: input_boolean.dehumidifier_intended
      - action: timer.start
        target:
          entity_id: timer.dehumidifier_manual_grace
    - conditions: >-
        {{ trigger.entity_id == 'switch.studio_humidifier_socket_1'
           and trigger.to_state.state != states('input_boolean.humidifier_intended') }}
      sequence:
      - action: "input_boolean.turn_{{ trigger.to_state.state }}"
        target:
          entity_id: input_boolean.humidifier_intended
      - action: timer.start
        target:
          entity_id: timer.humidifier_manual_grace
  mode: queued
