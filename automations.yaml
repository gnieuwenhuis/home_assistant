# ============================================================
# HVAC controllers
# ------------------------------------------------------------
# Each room has one controller running every minute. It turns
# the room's heat pump on/off and aligns its hvac_mode and
# setpoint with the room's current need:
#
#   indoor < preferred − swing   → heating mode pumps on,
#                                  cooling mode pumps off
#   indoor > preferred + swing   → cooling mode pumps on,
#                                  heating mode pumps off
#   inside the dead band         → no action
#
# `swing` is read from input_number.<room>_temp_range, so a
# single helper controls how aggressively the room cycles in
# both heating and cooling.
# ============================================================

- id: office_hvac_controller
  alias: Office HVAC Controller
  description: >-
    Manage the office heat pump (switch + climate) every minute, based on
    indoor temp vs. office_preferred_temperature ± office_temp_range and the
    current heat_pump_mode (heating | cooling).
  triggers:
  - trigger: time_pattern
    minutes: /1
  variables:
    current_temp: "{{ states('sensor.office_baseboard_current_temperature') | float(0) }}"
    preferred:    "{{ states('input_number.office_preferred_temperature')   | float(0) }}"
    swing:        "{{ states('input_number.office_temp_range')              | float(0) }}"
    mode:         "{{ states('input_select.heat_pump_mode') }}"
    setpoint:     "{{ states('sensor.office_heat_pump_setpoint_temperature') }}"
    too_cold:     "{{ current_temp < (preferred - swing) }}"
    too_hot:      "{{ current_temp > (preferred + swing) }}"
    desired_off:  "{{ (mode == 'heating' and too_hot) or (mode == 'cooling' and too_cold) }}"
  conditions:
  - "{{ mode in ['heating', 'cooling'] }}"
  - "{{ too_cold or too_hot }}"
  actions:
  - choose:
    # Heating: room too cold → ensure pump on in HEAT mode
    - conditions: "{{ mode == 'heating' and too_cold }}"
      sequence:
      - if:
        - condition: device
          type: is_off
          device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          entity_id: a9aab30924fb7a9b7453d31f6dfd0bce  # office heat pump SWITCH
          domain: switch
        then:
        - action: switch.turn_on
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
        - action: climate.set_temperature
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            temperature: "{{ setpoint }}"
      - if:
        - condition: not
          conditions:
          - condition: device
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
            entity_id: 723114cb5d2975341188965a065ef5f3  # office heat pump CLIMATE
            domain: climate
            type: is_hvac_mode
            hvac_mode: heat
        then:
        - action: climate.set_hvac_mode
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            hvac_mode: heat
        - action: climate.set_temperature
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            temperature: "{{ setpoint }}"
    # Cooling: room too hot → ensure pump on in COOL mode
    - conditions: "{{ mode == 'cooling' and too_hot }}"
      sequence:
      - if:
        - condition: device
          type: is_off
          device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          entity_id: a9aab30924fb7a9b7453d31f6dfd0bce
          domain: switch
        then:
        - action: switch.turn_on
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
        - action: climate.set_temperature
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            temperature: "{{ setpoint }}"
      - if:
        - condition: not
          conditions:
          - condition: device
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
            entity_id: 723114cb5d2975341188965a065ef5f3
            domain: climate
            type: is_hvac_mode
            hvac_mode: cool
        then:
        - action: climate.set_hvac_mode
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            hvac_mode: cool
        - action: climate.set_temperature
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          data:
            temperature: "{{ setpoint }}"
    # Out of band in the wrong direction for the current mode → ensure pump off
    - conditions: "{{ desired_off }}"
      sequence:
      - if:
        - condition: device
          type: is_on
          device_id: cd83ce323b2ad0764d397ab18b5a5fa3
          entity_id: a9aab30924fb7a9b7453d31f6dfd0bce
          domain: switch
        then:
        - action: switch.turn_off
          target:
            device_id: cd83ce323b2ad0764d397ab18b5a5fa3
  mode: single

